<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mira Portfolio{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        html{
            scroll-behavior:smooth;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0f172a;
            color:white;
            font-family:'Segoe UI',sans-serif;
            overflow-x:hidden;
        }

        .navbar{
            background:rgba(15,23,42,.9);
            backdrop-filter:blur(15px);
            border-bottom:1px solid rgba(255,255,255,.08);
        }

        .navbar-brand{
            color:#60a5fa !important;
            font-size:30px;
            font-weight:bold;
        }

        .nav-link{
            color:white !important;
            margin-left:20px;
            transition:0.3s;
            text-decoration:none;
        }

        .nav-link:hover{
            color:#60a5fa !important;
        }

        .hero{
            min-height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            animation:fadeIn 1.5s;
        }

        .hero h1{
            font-size:72px;
            font-weight:700;
        }

        .hero h2{
            color:#60a5fa;
            margin:20px 0;
        }

        .hero p{
            color:#cbd5e1;
            max-width:700px;
            font-size:22px;
        }

        .btn-main{
            display:inline-block;
            background:#3b82f6;
            color:white;
            padding:14px 40px;
            border-radius:40px;
            margin-top:35px;
            text-decoration:none;
            transition:.3s;
            font-weight:600;
        }

        .btn-main:hover{
            background:#2563eb;
            color:white;
            transform:translateY(-5px);
            box-shadow:0 0 30px rgba(59,130,246,.6);
        }

        section{
            padding:120px 0;
        }

        .section-title{
            text-align:center;
            font-size:42px;
            font-weight:bold;
            margin-bottom:50px;
            color:#60a5fa;
        }

        .card-dark{
            background:#1e293b;
            border-radius:20px;
            padding:30px;
            transition:.3s;
            border:1px solid rgba(255,255,255,.08);
            height:100%;
        }

        .card-dark:hover{
            transform:translateY(-10px);
            box-shadow:0 0 35px rgba(96,165,250,.35);
        }

        footer{
            padding:40px 0;
            text-align:center;
            color:#94a3b8;
            border-top:1px solid rgba(255,255,255,.08);
            margin-top:50px;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(40px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg">

    <div class="container">

        <a class="navbar-brand" href="/">Portfolio</a>

        <div>

            <a class="nav-link d-inline" href="#about">About</a>

            <a class="nav-link d-inline" href="#skills">Skills</a>

            <a class="nav-link d-inline" href="#projects">Projects</a>

            <a class="nav-link d-inline" href="#contacts">Contacts</a>

        </div>

    </div>

</nav>

<div class="container">

{% block content %}

{% endblock %}

</div>

<footer>

 • Portfolio Website

</footer>

</body>
</html>
